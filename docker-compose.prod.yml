# Production Docker Compose
version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-prod
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - research-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: chroma-prod
    environment:
      - CHROMA_DB_IMPL=duckdb+parquet
      - CHROMA_PERSIST_DIRECTORY=/data
    volumes:
      - chroma_data:/data
    networks:
      - research-network

  neo4j:
    image: neo4j:5-community
    container_name: neo4j-prod
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
    volumes:
      - neo4j_data:/data
    networks:
      - research-network

  redis:
    image: redis:7-alpine
    container_name: redis-prod
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - research-network

  pgvector:
    image: ankane/pgvector:latest
    container_name: pgvector-prod
    environment:
      - POSTGRES_USER=research
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=research_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - research-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: research-api-prod
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - OLLAMA_ENABLED=true
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=mistral
      - OLLAMA_EMBEDDING_MODEL=nomic-embed-text
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - DB_URL=postgresql+asyncpg://research:${DB_PASSWORD}@pgvector:5432/research_db
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_WORKERS=4
      - LOG_LEVEL=INFO
    depends_on:
      - ollama
      - chroma
      - neo4j
      - redis
      - pgvector
    networks:
      - research-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: research-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - research-network

  nginx:
    image: nginx:alpine
    container_name: nginx-prod
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    networks:
      - research-network

volumes:
  ollama_data:
  chroma_data:
  neo4j_data:
  redis_data:
  postgres_data:

networks:
  research-network:
    driver: bridge
